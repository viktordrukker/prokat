<title>ПРОКАТ — играбельный прототип</title>
<style>
/* ============================================================================
   ПРОКАТ — themes.css
   Emitted from tokens.json (W3C DTCG 2025.10) by the build step (Style
   Dictionary / Terrazzo). ONE shared token system for BOTH consumers:
     • Player Mini App  (React 19 + Vite)  → imports this file
     • Operator Admin   (Fastify + EJS + htmx) → imports this SAME file
   Components consume SEMANTIC tokens ONLY. No component reads a hard-coded color.

   THEME CONTRACT (CI gate): every [data-theme] block below defines the COMPLETE
   semantic set and passes contrast + colorblind checks, or it does not ship.

   GEOMETRY IS SHARED. Space / radius / type-scale / motion live once in :root and
   are NOT re-declared per theme — proving "reskin via tokens only, identical
   geometry." Themes touch only the SKIN layer (color, display face, texture,
   border, foil, spotlight).

   Runtime switch (no rebuild, no redeploy):
     operator sets key in admin → SystemSetting → Valkey pub-sub settings.changed
     → client: document.documentElement.dataset.theme = key
                document.documentElement.dataset.mode  = 'light' | 'dark'
   ========================================================================== */

/* ---- GEOMETRY + MOTION (shared across all themes) ------------------------ */
:root {
  /* type scale */
  --pk-fs-1: .75rem;  --pk-fs-2: .875rem; --pk-fs-3: 1rem;
  --pk-fs-4: 1.25rem; --pk-fs-5: 1.75rem; --pk-fs-6: 2.5rem;  --pk-fs-7: 3.5rem;
  --pk-lh-tight: 1.15; --pk-lh-body: 1.5;
  --pk-fw-body: 400; --pk-fw-medium: 500; --pk-fw-semibold: 600; --pk-fw-bold: 700;
  /* space (4px base) */
  --pk-sp-1: 4px; --pk-sp-2: 8px; --pk-sp-3: 12px; --pk-sp-4: 16px;
  --pk-sp-5: 24px; --pk-sp-6: 32px; --pk-sp-7: 48px; --pk-sp-8: 64px;
  /* radius */
  --pk-r-sm: 6px; --pk-r-md: 12px; --pk-r-lg: 20px; --pk-r-card: 14px; --pk-r-pill: 999px;
  /* motion */
  --pk-ease-standard: cubic-bezier(.2,0,0,1);
  --pk-ease-reveal:   cubic-bezier(.16,1,.3,1);
  --pk-dur-fast: 120ms; --pk-dur-base: 240ms; --pk-dur-reveal: 600ms;
  /* hit target floor (WCAG 2.2 / Telegram) */
  --pk-hit: 44px;

  color-scheme: dark;
}

/* ===========================================================================
   CINEMA  — base theme «Golden-Age Marquee». DARK is the canonical install.
   =========================================================================== */
:root,
[data-theme="cinema"] {
  --pk-color-bg: #15110E;
  --pk-color-surface: #211A14;
  --pk-color-surface-raised: #2C2219;
  --pk-color-ink: #F6EEDF;
  --pk-color-ink-muted: #B7A78C;
  --pk-color-accent: #E8B84B;
  --pk-color-accent-ink: #1A1206;
  --pk-color-accent-soft: rgba(232,184,75,.14);
  --pk-color-success: #4FB286;
  --pk-color-warn: #E0A33A;
  --pk-color-danger: #D9534F;
  --pk-color-foil: linear-gradient(110deg,#F6EEDF,#E8B84B,#9FD7C0);
  --pk-color-border: rgba(246,238,223,.14);
  --pk-color-border-strong: rgba(246,238,223,.28);
  --pk-border-width: 1px;

  /* GENRE — color + MANDATORY pattern (shared <defs>) + always a text label */
  --pk-genre-drama: #6C8AE4;    --pk-genre-drama-pat: url(#pk-pat-hatch);
  --pk-genre-comedy: #E8B84B;   --pk-genre-comedy-pat: url(#pk-pat-dots);
  --pk-genre-action: #D9534F;   --pk-genre-action-pat: url(#pk-pat-chevron);
  --pk-genre-arthouse: #9B7BD4; --pk-genre-arthouse-pat: url(#pk-pat-cross);
  --pk-genre-epic: #4FB286;     --pk-genre-epic-pat: url(#pk-pat-grid);

  /* currency identity (icon + label + token; never color alone) */
  --pk-cur-money: #E8B84B;      /* 💰 Money — spendable        */
  --pk-cur-acclaim: #C9A0E0;    /* 🏆 Acclaim — reputation     */
  --pk-cur-stars: #7FB6E8;      /* ⭐ Stars — premium cosmetic  */

  --pk-font-display: "Fraunces", Georgia, "Times New Roman", serif;
  --pk-font-body: "Inter", system-ui, -apple-system, sans-serif;
  --pk-font-num: "Inter", ui-monospace, "SF Mono", monospace;
  --pk-font-display-wght: 600;
  --pk-display-letterspacing: .002em;

  --pk-elev-1: 0 1px 2px rgba(0,0,0,.4);
  --pk-elev-2: 0 4px 12px rgba(0,0,0,.45);
  --pk-elev-3: 0 16px 40px rgba(0,0,0,.5);
  --pk-elev-spot: 0 0 40px rgba(232,184,75,.25);          /* the spotlight is a token */
  --pk-spotlight: radial-gradient(120% 90% at 50% 8%, rgba(232,184,75,.18), transparent 62%);
  --pk-bloom: radial-gradient(60% 60% at 50% 38%, rgba(232,184,75,.42), rgba(232,184,75,0) 70%);

  /* texture token — subtle warm screen-print grain */
  --pk-texture: radial-gradient(rgba(232,184,75,.05) .5px, transparent .6px);
  --pk-texture-size: 3px 3px;
}

[data-theme="cinema"][data-mode="light"] {            /* «Matinee» — warm paper */
  color-scheme: light;
  --pk-color-bg: #EBE0CC;
  --pk-color-surface: #F6EEDC;
  --pk-color-surface-raised: #FFFAF0;
  --pk-color-ink: #241A10;
  --pk-color-ink-muted: #6E5C43;
  --pk-color-accent: #B5790F;

/* ============================================================================
   ПРОКАТ — components.css  ·  THE SINGLE SOURCE OF TRUTH (L1–L3)
   ----------------------------------------------------------------------------
   Every ATOM, MOLECULE and ORGANISM is defined here EXACTLY ONCE. Screens and
   the prototype LINK this file and instantiate components by their canonical
   class / data-c id — they never redraw a button, chip, stat or card inline.

   INHERITANCE (enforced — see component-graph.json + Traceability gates):
     L0 tokens (themes.css) → L1 atoms → L2 molecules → L3 organisms → L4
     templates → L5 screens → L6 epochs (token-value swap only).
   RULES: an atom binds ONLY semantic tokens (never another atom). A molecule
   composes ONLY atoms. An organism composes ONLY molecules/atoms. Nothing here
   contains a raw colour / space / radius / type / duration literal — the only
   literals permitted are STRUCTURAL primitives (0, 1px hairline, 50% circle,
   100% fill, 1fr) which are not themeable. Themes never touch this file.

   NAMING: classes are .pk-<name>; every component root also carries
   data-c="<ID>" (A-/M-/O-) so the DOM is machine-traceable to the graph.
   ========================================================================== */

/* ---- semantic geometry aliases (spec naming → existing scale) ------------- */
:root{
  --pk-space-1:var(--pk-sp-1); --pk-space-2:var(--pk-sp-2); --pk-space-3:var(--pk-sp-3);
  --pk-space-4:var(--pk-sp-4); --pk-space-5:var(--pk-sp-5); --pk-space-6:var(--pk-sp-6);
  --pk-radius-sm:var(--pk-r-sm); --pk-radius-md:var(--pk-r-md); --pk-radius-lg:var(--pk-r-lg);
  --pk-radius-card:var(--pk-r-card); --pk-radius-pill:var(--pk-r-pill);
  --pk-type-1:var(--pk-fs-1); --pk-type-2:var(--pk-fs-2); --pk-type-3:var(--pk-fs-3);
  --pk-type-4:var(--pk-fs-4); --pk-type-5:var(--pk-fs-5); --pk-type-6:var(--pk-fs-6);
  /* type weight (self-sufficient: themes.css also sets these; identical values, no conflict) */
  --pk-fw-body:400; --pk-fw-medium:500; --pk-fw-semibold:600; --pk-fw-bold:700;
}

/* ===========================================================================
   L1 · ATOMS
   =========================================================================== */

/* A-01 Button — variants primary/secondary/ghost/danger; all states */
.pk-btn{
  display:inline-flex; align-items:center; justify-content:center; gap:var(--pk-space-2);
  min-height:var(--pk-hit); padding:0 var(--pk-space-5);
  border:1px solid transparent; border-radius:var(--pk-radius-pill);
  font-family:var(--pk-font-body); font-size:var(--pk-type-3); font-weight:var(--pk-fw-semibold);
  line-height:1; color:var(--pk-color-ink); background:transparent;
  cursor:pointer; user-select:none;
  transition:transform var(--pk-dur-fast) var(--pk-ease-standard),
             filter var(--pk-dur-fast) var(--pk-ease-standard),
             background var(--pk-dur-fast) var(--pk-ease-standard);
}
.pk-btn:hover{ transform:translateY(-1px); }
.pk-btn:active{ transform:translateY(0); }
.pk-btn:focus-visible{ outline:2px solid var(--pk-color-accent); outline-offset:2px; }
.pk-btn[disabled],.pk-btn.is-disabled{ opacity:.5; cursor:not-allowed; transform:none; filter:grayscale(.3); }
.pk-btn.is-loading{ color:transparent; pointer-events:none; position:relative; }
.pk-btn.is-loading::after{ content:""; position:absolute; width:16px; height:16px; border-radius:50%;
  border:2px solid var(--pk-color-accent-ink); border-top-color:transparent; animation:pk-spin .7s linear infinite; }
.pk-btn--primary{ background:var(--pk-color-accent); color:var(--pk-color-accent-ink); box-shadow:var(--pk-elev-spot); }
.pk-btn--primary:hover{ filter:brightness(1.06); }
.pk-btn--secondary{ border-color:var(--pk-color-border-strong); }
.pk-btn--secondary:hover{ border-color:var(--pk-color-accent); }
.pk-btn--ghost{ color:var(--pk-color-ink-muted); }
.pk-btn--ghost:hover{ color:var(--pk-color-ink); }
.pk-btn--danger{ background:var(--pk-color-danger); color:#fff; }
.pk-btn--block{ width:100%; }

/* A-02 Icon — sized svg using a sprite symbol; tints via currentColor */
.pk-icon{ width:1.25em; height:1.25em; display:inline-block; vertical-align:middle; color:inherit; flex:none; }
.pk-icon--sm{ width:1em; height:1em; }
.pk-icon--lg{ width:1.5em; height:1.5em; }

/* A-03 Chip — base; genre / role / status / chemistry variants */
.pk-chip{
  display:inline-flex; align-items:center; gap:var(--pk-space-2);
  height:26px; padding:0 var(--pk-space-3); box-sizing:border-box;
  border:1px solid transparent; border-radius:var(--pk-radius-pill);
  font-size:var(--pk-type-1); font-weight:var(--pk-fw-semibold); line-height:1; letter-spacing:.03em;
  color:var(--pk-color-ink); background:color-mix(in srgb, var(--pk-color-ink) 9%, transparent);
}
.pk-chip--role{ font-weight:var(--pk-fw-bold); letter-spacing:.05em; text-transform:uppercase; }
.pk-chip--genre{ background:color-mix(in srgb, var(--pk-color-ink) 8%, transparent); }
.pk-chip--genre .pk-icon{ color:var(--pk-genre, var(--pk-color-accent)); }
.pk-chip[data-genre="drama"]{ --pk-genre:var(--pk-genre-drama); }
.pk-chip[data-genre="comedy"]{ --pk-genre:var(--pk-genre-comedy); }
.pk-chip[data-genre="action"]{ --pk-genre:var(--pk-genre-action); }
.pk-chip[data-genre="arthouse"]{ --pk-genre:var(--pk-genre-arthouse); }
.pk-chip[data-genre="epic"]{ --pk-genre:var(--pk-genre-epic); }
.pk-chip--chem{ border-color:var(--pk-color-border-strong); background:transparent; color:var(--pk-color-ink-muted); border-radius:var(--pk-radius-sm); height:auto; padding:2px 7px; letter-spacing:.04em; }

/* A-04 Stat-pip — one stat value + label */
.pk-stat-pip{ text-align:center; }
.pk-stat-pip__val{ font-family:var(--pk-font-num); font-size:var(--pk-type-3); font-weight:var(--pk-fw-semibold); color:var(--pk-color-ink); line-height:1; }
.pk-stat-pip__lbl{ font-size:9px; letter-spacing:.06em; color:var(--pk-color-ink-muted); margin-top:2px; }

/* A-05 Badge — edition / status markers */
.pk-badge{ display:inline-flex; align-items:center; gap:var(--pk-space-1); height:22px; padding:0 var(--pk-space-2);
  border:1px solid transparent; border-radius:var(--pk-radius-pill); font-size:var(--pk-type-1); font-weight:var(--pk-fw-bold);
  letter-spacing:.05em; line-height:1; color:var(--pk-color-ink); background:color-mix(in srgb, var(--pk-color-ink) 12%, transparent); }
.pk-badge--foil{ background:var(--pk-color-foil); background-size:200% 100%; color:#1a1206; animation:pk-foil 6s linear infinite; }
.pk-badge--alt{ background:transparent; border-color:var(--pk-color-accent); color:var(--pk-color-accent); }
.pk-badge--retired{ background:color-mix(in srgb, var(--pk-color-ink) 8%, transparent); color:var(--pk-color-ink-muted); }
.pk-badge--success{ background:color-mix(in srgb, var(--pk-color-success) 18%, transparent); color:var(--pk-color-success); }

/* A-06 Poster-frame — IP-safe card art slot with spotlight bloom */
.pk-poster-frame{ position:relative; border-radius:var(--pk-radius-md); overflow:hidden;
  background:linear-gradient(180deg, color-mix(in srgb, var(--pk-color-accent) 12%, var(--pk-color-bg)), var(--pk-color-bg));
  border:1px solid var(--pk-color-border); aspect-ratio:4/3; }
.pk-poster-frame::before{ content:""; position:absolute; inset:0; background:var(--pk-bloom); pointer-events:none; }
.pk-poster-frame__sil{ position:absolute; left:50%; top:54%; transform:translate(-50%,-50%);
  width:46%; aspect-ratio:1; border-radius:50%;
  background:radial-gradient(circle at 50% 40%, color-mix(in srgb, var(--pk-color-accent) 45%, transparent), transparent 70%);
  border:1px solid color-mix(in srgb, var(--pk-color-accent) 40%, transparent); }

/* A-07 Currency-amount — icon + value + label; never colour-alone */
.pk-currency{ display:inline-flex; align-items:center; gap:var(--pk-space-2); }
.pk-currency__val{ font-family:var(--pk-font-num); font-weight:var(--pk-fw-semibold); color:var(--pk-color-ink); }
.pk-currency__lbl{ font-size:var(--pk-type-2); color:var(--pk-color-ink-muted); }
.pk-currency__dot{ width:8px; height:8px; border-radius:50%; }
.pk-currency[data-cur="money"] .pk-currency__dot{ background:var(--pk-cur-money); }
.pk-currency[data-cur="acclaim"] .pk-currency__dot{ background:var(--pk-cur-acclaim); }
.pk-currency[data-cur="stars"] .pk-currency__dot{ background:var(--pk-cur-stars); }

/* A-08 Toggle */
.pk-toggle{ display:inline-flex; width:46px; height:26px; border-radius:var(--pk-radius-pill);
  background:color-mix(in srgb, var(--pk-color-ink) 18%, transparent); padding:3px; cursor:pointer; transition:background var(--pk-dur-fast) var(--pk-ease-standard); }
.pk-toggle__knob{ width:20px; height:20px; border-radius:50%; background:var(--pk-color-ink-muted); transition:transform var(--pk-dur-fast) var(--pk-ease-standard); }
.pk-toggle[aria-checked="true"]{ background:var(--pk-color-accent); justify-content:flex-end; }
.pk-toggle[aria-checked="true"] .pk-toggle__knob{ background:var(--pk-color-accent-ink); }
.pk-toggle:focus-visible{ outline:2px solid var(--pk-color-accent); outline-offset:2px; }

/* A-09 Input */
.pk-input{ width:100%; min-height:var(--pk-hit); padding:0 var(--pk-space-4); box-sizing:border-box;
  background:var(--pk-color-bg); border:1px solid var(--pk-color-border-strong); border-radius:var(--pk-radius-md);
  color:var(--pk-color-ink); font-family:var(--pk-font-body); font-size:var(--pk-type-3); }
.pk-input::placeholder{ color:var(--pk-color-ink-muted); }
.pk-input:focus-visible{ outline:2px solid var(--pk-color-accent); outline-offset:1px; }
.pk-input.is-error{ border-color:var(--pk-color-danger); }

/* A-10 Meter — budget / storage gauge */
.pk-meter{ display:flex; align-items:center; gap:var(--pk-space-3); }
.pk-meter__track{ flex:1; height:8px; border-radius:var(--pk-radius-pill); overflow:hidden; background:color-mix(in srgb, var(--pk-color-ink) 14%, transparent); }
.pk-meter__fill{ height:100%; background:var(--pk-color-accent); border-radius:var(--pk-radius-pill); }
.pk-meter.is-error .pk-meter__fill{ background:var(--pk-color-danger); }
.pk-meter__val{ font-family:var(--pk-font-num); font-size:var(--pk-type-2); color:var(--pk-color-ink-muted); }

/* A-11 Help-badge — "?" affordance (baked, centered) in a ≥44px hit area */
.pk-help{ display:inline-grid; place-items:center; width:var(--pk-hit); height:var(--pk-hit);
  border:0; background:transparent; cursor:pointer; }
.pk-help img,.pk-help__glyph{ width:18px; height:18px; display:block; }
.pk-help:focus-visible{ outline:2px solid var(--pk-color-accent); outline-offset:2px; border-radius:50%; }

/* A-12 Spotlight — reusable bulb-glow primitive */
.pk-spotlight{ position:relative; }
.pk-spotlight::before{ content:""; position:absolute; inset:0; background:var(--pk-spotlight); pointer-events:none; }

/* ===========================================================================
   L2 · MOLECULES  (compose atoms only)
   =========================================================================== */

/* M-01 Card-header = poster-frame[A-06] + name + role chip[A-03] */
.pk-card-header{ display:flex; flex-direction:column; gap:var(--pk-space-2); }
.pk-card-header__name{ font-family:var(--pk-font-display); font-weight:var(--pk-fw-semibold); font-size:var(--pk-type-4); line-height:1.05; }
.pk-card-header__meta{ display:flex; flex-wrap:wrap; gap:var(--pk-space-2); align-items:center; }

/* M-02 Stat-row = 4–5 stat-pips[A-04] + budget meter[A-10] */
.pk-stat-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:var(--pk-space-1); }

/* M-03 HUD / currency-bar = 3 currency-amounts[A-07] */
.pk-hud{ display:grid; grid-template-columns:repeat(3,1fr); gap:var(--pk-space-2); }
.pk-hud__cell{ display:flex; flex-direction:column; align-items:center; gap:2px; padding:var(--pk-space-3);
  border-radius:var(--pk-radius-md); background:var(--pk-color-surface); border:1px solid var(--pk-color-border); }

/* M-04 Channel-row = label + risk/threshold + entry currency[A-07] */
.pk-channel-row{ display:flex; align-items:center; gap:var(--pk-space-3); padding:var(--pk-space-3);
  border-radius:var(--pk-radius-md); background:var(--pk-color-surface); border:1px solid var(--pk-color-border); }
.pk-channel-row.is-selected{ border-color:var(--pk-color-accent); box-shadow:var(--pk-elev-spot); }

/* M-05 Codex-entry = name + multiplier + tag badge[A-05] */
.pk-codex-entry{ padding:var(--pk-space-3); border-radius:var(--pk-radius-md);
  background:var(--pk-color-surface); border:1px solid var(--pk-color-border); }
.pk-codex-entry.is-locked{ opacity:.55; }

/* M-06 Leaderboard-row = rank + title + score (rank by number+position, not colour) */
.pk-rank-row{ display:flex; align-items:center; gap:var(--pk-space-3); padding:var(--pk-space-3) 0; border-bottom:1px solid var(--pk-color-border); }
.pk-rank-row__num{ font-family:var(--pk-font-num); font-size:var(--pk-type-4); color:var(--pk-color-ink-muted); width:1.6em; text-align:right; }

/* M-07 Shop-item = poster-frame[A-06] + name + price button[A-01] (item visible pre-buy) */
.pk-shop-item{ display:flex; flex-direction:column; gap:var(--pk-space-2); padding:var(--pk-space-2);
  border-radius:var(--pk-radius-card); background:var(--pk-color-surface-raised); border:1px solid var(--pk-color-border); }

/* M-08 Build-slot = role label + filled card / empty / invalid (never a spinner) */
.pk-slot{ position:relative; border-radius:var(--pk-radius-md); border:1px solid var(--pk-color-border-strong);
  background:var(--pk-color-surface); padding:var(--pk-space-2); min-height:96px; }
.pk-slot.is-empty{ border-style:dashed; display:grid; place-items:center; color:var(--pk-color-ink-muted); }
.pk-slot.is-selected{ border-color:var(--pk-color-accent); box-shadow:var(--pk-elev-spot); }
.pk-slot.is-error{ border-color:var(--pk-color-danger); }

/* M-09 Setting-row = label + control + inline help[A-11] */
.pk-setting-row{ display:flex; align-items:center; gap:var(--pk-space-3); min-height:var(--pk-hit);
  padding:var(--pk-space-2) 0; border-bottom:1px solid var(--pk-color-border); }
.pk-setting-row__label{ flex:1; font-size:var(--pk-type-3); }

/* ===========================================================================
   L3 · ORGANISMS  (compose molecules / atoms only)
   =========================================================================== */

/* O-01 Card = card-header[M-01] + stat-row[M-02] + badges[A-05] + spotlight[A-12] */
.pk-card{ position:relative; border-radius:var(--pk-radius-card); background:var(--pk-color-surface-raised);
  border:1px solid var(--pk-color-border-strong); box-shadow:var(--pk-elev-2); padding:var(--pk-space-3); overflow:hidden; }
.pk-card.is-selected{ border:2px solid var(--pk-color-accent); box-shadow:var(--pk-elev-2),var(--pk-elev-spot); }
.pk-card.is-retired{ opacity:.6; filter:saturate(.5); }
.pk-card.is-foil{ box-shadow:var(--pk-elev-2),var(--pk-elev-spot); }
.pk-card.is-locked > :not(.pk-card__lock){ filter:blur(1px); opacity:.5; }
.pk-card__lock{ position:absolute; inset:0; display:grid; place-items:center; z-index:2;
  background:color-mix(in srgb, var(--pk-color-bg) 55%, transparent); }

/* O-01 Card · --compact variant — grid / Collection density (registered variant, not a redraw).
   Tightens the same composed parts so the full 5-stat card fits a 2-up grid cell. */
.pk-card--compact{ padding:var(--pk-space-2); }
.pk-card--compact .pk-card-header{ gap:var(--pk-space-1); }
.pk-card--compact .pk-poster-frame{ aspect-ratio:1/1; }
.pk-card--compact .pk-card-header__name{ min-height:2em; display:flex; align-items:flex-end; }
.pk-card--compact .pk-card-header__meta{ gap:var(--pk-space-1); }
.pk-card--compact .pk-chip{ padding:2px var(--pk-space-2); font-size:var(--pk-type-1); }
.pk-card--compact .pk-stat-row{ gap:var(--pk-space-1); margin-top:var(--pk-space-1); }
.pk-card--compact .pk-stat-pip__val{ font-size:var(--pk-type-1); }
.pk-card--compact .pk-stat-pip__lbl{ font-size:7px; letter-spacing:-.01em; }
.pk-card--compact .pk-meter{ gap:var(--pk-space-2); margin-top:var(--pk-space-2); }
.pk-card--compact .pk-meter__val{ font-size:var(--pk-type-1); white-space:nowrap; }

/* O-02 Premiere-stage = poster-frame[A-06] + marquee valance + result (curtain-raise) */
.pk-stage{ position:relative; border-radius:var(--pk-radius-lg); overflow:hidden;
  background:var(--pk-color-bg); border:1px solid var(--pk-color-border); }
.pk-stage__valance{ position:absolute; top:0; left:0; right:0; height:14px; z-index:3;
  background:repeating-linear-gradient(90deg, var(--pk-color-accent) 0 10px, color-mix(in srgb,var(--pk-color-accent) 55%, #000) 10px 20px); }
.pk-stage__curtain{ position:absolute; top:0; bottom:0; width:51%; z-index:2;
  background:linear-gradient(90deg, color-mix(in srgb,var(--pk-color-danger) 45%, #200), color-mix(in srgb,var(--pk-color-danger) 70%, #000));
  will-change:transform; }
.pk-stage__curtain--l{ left:0; }
.pk-stage__curtain--r{ right:0; }

/* O-03 Tab-bar = 5 tab atoms (icon[A-02] + label) */
.pk-tabbar{ display:flex; justify-content:space-around; align-items:center;
  border-top:1px solid var(--pk-color-border); background:var(--pk-color-surface); }
.pk-tabbar__tab{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  min-height:var(--pk-hit); padding:var(--pk-space-2) 0; border:0; background:transparent;
  color:var(--pk-color-ink-muted); font-size:10px; cursor:pointer; }
.pk-tabbar__tab.is-active{ color:var(--pk-color-accent); }

/* O-04 Help-drawer = bottom-sheet dialog (HelpPanel) */
.pk-drawer{ position:fixed; left:0; right:0; bottom:0; z-index:60; transform:translateY(100%);
  background:var(--pk-color-surface-raised); border-top:1px solid var(--pk-color-border-strong);
  border-radius:var(--pk-radius-lg) var(--pk-radius-lg) 0 0; box-shadow:var(--pk-elev-3);
  padding:var(--pk-space-5); transition:transform var(--pk-dur-base) var(--pk-ease-reveal); }
.pk-drawer.is-open{ transform:translateY(0); }

/* O-05 Admin-table */
.pk-table{ width:100%; border-collapse:collapse; }
.pk-table th{ text-align:left; font-size:var(--pk-type-1); letter-spacing:.07em; text-transform:uppercase;
  color:var(--pk-color-ink-muted); padding:var(--pk-space-2) var(--pk-space-3); border-bottom:1px solid var(--pk-color-border-strong); }
.pk-table td{ padding:var(--pk-space-3); font-size:var(--pk-type-2); border-bottom:1px solid var(--pk-color-border); vertical-align:middle; }
.pk-table tr:last-child td{ border-bottom:0; }

/* O-06 Coachmark-hint = anchored spotlight + one line + optional "Подробнее" → help (G3) */
.pk-coach{ position:relative; z-index:50; display:flex; gap:var(--pk-space-3); align-items:flex-start;
  padding:var(--pk-space-3) var(--pk-space-4); border-radius:var(--pk-radius-md);
  background:color-mix(in srgb, var(--pk-color-accent) 14%, var(--pk-color-surface-raised));
  border:1px solid color-mix(in srgb, var(--pk-color-accent) 40%, transparent); box-shadow:var(--pk-elev-2); }
.pk-coach__dot{ width:8px; height:8px; border-radius:50%; background:var(--pk-color-accent); margin-top:5px; flex:none;
  box-shadow:0 0 0 0 var(--pk-color-accent); animation:pk-pulse 1.8s ease-out infinite; }
.pk-coach__body{ font-size:var(--pk-type-2); color:var(--pk-color-ink); line-height:1.45; }
.pk-coach__more{ color:var(--pk-color-accent); font-weight:var(--pk-fw-semibold); cursor:pointer; }
/* anchored highlight ring placed on the real target element */
.pk-coach-anchor{ position:relative; }
.pk-coach-anchor::after{ content:""; position:absolute; inset:-4px; border-radius:inherit;
  box-shadow:0 0 0 2px var(--pk-color-accent), var(--pk-elev-spot); pointer-events:none; animation:pk-pulse 1.8s ease-out infinite; }

/* O-07 Season-banner */
.pk-season{ position:relative; overflow:hidden; padding:var(--pk-space-4); border-radius:var(--pk-radius-lg);
  background:var(--pk-color-surface-raised); border:1px solid var(--pk-color-border); }
.pk-season::before{ content:""; position:absolute; inset:0; background:var(--pk-spotlight); pointer-events:none; }

/* O-08 Progress-ladder = career meter[A-10] + level title */
.pk-ladder{ padding:var(--pk-space-4); border-radius:var(--pk-radius-md); background:var(--pk-color-surface); border:1px solid var(--pk-color-border); }

/* O-09 Overlay system = Scrim + Bottom-Sheet + Modal (focus target, ESC/Back, reduced-motion) */
.pk-scrim{ position:absolute; inset:0; z-index:80; background:color-mix(in srgb, var(--pk-color-bg) 64%, rgba(0,0,0,.7));
  opacity:0; pointer-events:none; transition:opacity var(--pk-dur-base) var(--pk-ease-standard); }
.pk-scrim.is-open{ opacity:1; pointer-events:auto; }
.pk-sheet{ position:absolute; left:0; right:0; bottom:0; z-index:90; max-height:86%; display:flex; flex-direction:column;
  background:var(--pk-color-surface-raised); border-top:1px solid var(--pk-color-border-strong);
  border-radius:var(--pk-radius-lg) var(--pk-radius-lg) 0 0; box-shadow:var(--pk-elev-3);
  transform:translateY(101%); transition:transform var(--pk-dur-base) var(--pk-ease-reveal); }
.pk-sheet.is-open{ transform:translateY(0); }
.pk-sheet__grip{ width:36px; height:4px; border-radius:var(--pk-radius-pill); background:var(--pk-color-border-strong); margin:10px auto 4px; flex:none; }
.pk-sheet__head{ display:flex; align-items:flex-start; justify-content:space-between; gap:var(--pk-space-3); padding:var(--pk-space-2) var(--pk-space-5) var(--pk-space-3); flex:none; }
.pk-sheet__title{ font-family:var(--pk-font-display); font-weight:var(--pk-fw-semibold); font-size:var(--pk-type-4); }
.pk-sheet__sub{ font-size:var(--pk-type-1); color:var(--pk-color-ink-muted); margin-top:2px; }
.pk-sheet__body{ padding:0 var(--pk-space-5) var(--pk-space-4); overflow-y:auto; }
.pk-sheet__foot{ padding:var(--pk-space-4) var(--pk-space-5); border-top:1px solid var(--pk-color-border); display:flex; gap:var(--pk-space-3); flex:none; }
.pk-modal{ position:absolute; left:50%; top:50%; z-index:90; width:min(330px, 86%);
  background:var(--pk-color-surface-raised); border:1px solid var(--pk-color-border-strong); border-radius:var(--pk-radius-lg);
  box-shadow:var(--pk-elev-3); transform:translate(-50%,-44%); opacity:0; pointer-events:none;
  transition:opacity var(--pk-dur-base) var(--pk-ease-standard), transform var(--pk-dur-base) var(--pk-ease-reveal); }
.pk-modal.is-open{ transform:translate(-50%,-50%); opacity:1; pointer-events:auto; }
.pk-modal__body{ padding:var(--pk-space-5) var(--pk-space-5) var(--pk-space-4); }
.pk-modal__title{ font-family:var(--pk-font-display); font-weight:var(--pk-fw-semibold); font-size:var(--pk-type-4); margin-bottom:var(--pk-space-2); }
.pk-modal__text{ font-size:var(--pk-type-2); color:var(--pk-color-ink-muted); line-height:1.5; }
.pk-modal__foot{ display:flex; gap:var(--pk-space-3); padding:0 var(--pk-space-5) var(--pk-space-5); }

/* M-10 Candidate = compact O-01 + budget foot (card-picker row); RETIRED disabled */
.pk-candidate{ width:100%; display:block; text-align:left; cursor:pointer; margin-bottom:var(--pk-space-3);
  background:var(--pk-color-surface); border:1px solid var(--pk-color-border); border-radius:var(--pk-radius-card);
  padding:var(--pk-space-3); transition:border-color var(--pk-dur-fast) var(--pk-ease-standard); }
.pk-candidate:hover{ border-color:var(--pk-color-accent); }
.pk-candidate.is-disabled{ opacity:.5; cursor:not-allowed; }
.pk-candidate__foot{ display:flex; align-items:center; justify-content:space-between; margin-top:var(--pk-space-3); }

/* O-10 Celebration / Splash = full-screen reward / level-up moment (bloom; collapses to fade under reduced-motion) */
.pk-splash{ position:absolute; inset:0; z-index:95; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:var(--pk-space-6); gap:var(--pk-space-3);
  background:radial-gradient(120% 78% at 50% 32%, color-mix(in srgb,var(--pk-color-accent) 26%, var(--pk-color-bg)), var(--pk-color-bg) 72%);
  opacity:0; pointer-events:none; transition:opacity var(--pk-dur-reveal) var(--pk-ease-reveal); }
.pk-splash.is-open{ opacity:1; pointer-events:auto; }
.pk-splash__icon{ width:96px; height:96px; border-radius:28px; display:grid; place-items:center; flex:none;
  background:var(--pk-color-accent); color:var(--pk-color-accent-ink); box-shadow:var(--pk-elev-spot); }
.pk-splash__icon svg{ width:46px; height:46px; }
.pk-splash__eyebrow{ font-size:var(--pk-type-1); letter-spacing:.16em; text-transform:uppercase; color:var(--pk-color-accent); }
.pk-splash__title{ font-family:var(--pk-font-display); font-weight:var(--pk-fw-semibold); font-size:var(--pk-type-6); line-height:1.05; }
.pk-splash__sub{ font-size:var(--pk-type-3); color:var(--pk-color-ink-muted); max-width:280px; line-height:1.45; }
.pk-splash__rewards{ display:flex; gap:var(--pk-space-2); flex-wrap:wrap; justify-content:center; margin-top:var(--pk-space-2); }
.pk-splash__foot{ position:absolute; left:var(--pk-space-5); right:var(--pk-space-5); bottom:calc(var(--pk-space-5) + env(safe-area-inset-bottom,0px)); display:flex; flex-direction:column; gap:var(--pk-space-2); }

/* ---- shared keyframes (allowed in L1 layer; structural, not themeable) ---- */
@keyframes pk-spin{ to{ transform:rotate(360deg); } }
@keyframes pk-foil{ from{ background-position:0 0; } to{ background-position:200% 0; } }
@keyframes pk-pulse{ 0%{ box-shadow:0 0 0 0 color-mix(in srgb,var(--pk-color-accent) 60%, transparent);} 70%{ box-shadow:0 0 0 10px transparent;} 100%{ box-shadow:0 0 0 0 transparent;} }
@media (prefers-reduced-motion: reduce){
  .pk-btn,.pk-toggle,.pk-drawer,.pk-coach__dot,.pk-coach-anchor::after,.pk-badge--foil{ animation:none !important; transition:none !important; }
}

/* ---- game shell (layout only; components come from the design system) ---- */
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--pk-color-bg);color:var(--pk-color-ink);font-family:var(--pk-font-ui,system-ui,-apple-system,Segoe UI,Roboto,sans-serif);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;min-height:100vh;min-height:100dvh}
b,.num{font-family:var(--pk-font-num,inherit)}
.app{width:100%;max-width:440px;min-height:100vh;min-height:100dvh;background:var(--pk-color-bg);display:flex;flex-direction:column;position:relative;overflow:hidden}
@media(min-width:540px){
  body{padding:18px;background:#08090c;background-image:radial-gradient(1200px 600px at 50% -10%, #15171d, #08090c)}
  .app{min-height:calc(100vh - 36px);min-height:min(900px,calc(100dvh - 36px));max-height:calc(100vh - 36px);max-height:calc(100dvh - 36px);border-radius:26px;border:1px solid var(--pk-color-border);box-shadow:0 30px 80px rgba(0,0,0,.55);overflow:hidden}
}
.topbar{position:sticky;top:0;z-index:6;background:var(--pk-color-surface);border-bottom:1px solid var(--pk-color-border);padding:10px 12px 8px}
.topbar__row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.brand{font-family:var(--pk-font-display,inherit);font-weight:800;letter-spacing:.14em;font-size:13px;color:var(--pk-color-ink)}
.lvlchip{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--pk-color-ink-muted);cursor:pointer}
.lvlchip b{color:var(--pk-color-accent)}
#screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 96px}
.scr{animation:scrIn .26s var(--pk-ease-standard)}
@keyframes scrIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.h1{font-family:var(--pk-font-display,inherit);font-size:22px;font-weight:800;margin:2px 0 2px}
.sub{color:var(--pk-color-ink-muted);font-size:13px;margin:0 0 14px}
.sec{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--pk-color-ink-muted);margin:18px 2px 8px;font-weight:700}
.row{display:flex;gap:8px}.row.wrap{flex-wrap:wrap}.spread{justify-content:space-between;align-items:center}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cand-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.slots{display:grid;gap:8px}
.fmt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.panel{background:var(--pk-color-surface-raised);border:1px solid var(--pk-color-border);border-radius:var(--pk-r-md);padding:12px}
.muted{color:var(--pk-color-ink-muted)}.small{font-size:12px}.tiny{font-size:11px}
.big-q{font-family:var(--pk-font-num,inherit);font-size:54px;font-weight:800;line-height:1;color:var(--pk-color-accent)}
.tabbar-wrap{position:absolute;left:0;right:0;bottom:0;padding:8px 12px calc(8px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--pk-color-surface) 70%,transparent);z-index:6}
.fmt{cursor:pointer;text-align:center;padding:10px 6px;border-radius:var(--pk-r-md);border:1px solid var(--pk-color-border);background:var(--pk-color-surface-raised);position:relative}
.fmt.is-selected{border-color:var(--pk-color-accent);box-shadow:0 0 0 1px var(--pk-color-accent) inset}
.fmt.is-locked{opacity:.5}
.fmt__name{font-weight:700;font-size:13px}.fmt__meta{font-size:10px;color:var(--pk-color-ink-muted);margin-top:2px}
.fmt__cd{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:color-mix(in srgb,var(--pk-color-surface) 78%,transparent);border-radius:var(--pk-r-md);font-size:11px;font-weight:700;color:var(--pk-color-ink-muted);gap:2px}
.toast{position:fixed;left:50%;bottom:18%;transform:translateX(-50%) translateY(12px);background:var(--pk-color-ink);color:var(--pk-color-bg);padding:10px 16px;border-radius:var(--pk-r-pill);font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.24s var(--pk-ease-standard);z-index:60;max-width:80%;text-align:center}
.toast.is-show{opacity:1;transform:translateX(-50%) translateY(0)}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--pk-color-border)}
.set-row:last-child{border-bottom:0}
.set-row__l{font-size:13px;font-weight:600}.set-row__h{font-size:11px;color:var(--pk-color-ink-muted);margin-top:2px;max-width:230px}
.seg{display:flex;gap:4px;flex-wrap:wrap}
.seg button{font-size:11px;padding:6px 9px;border-radius:var(--pk-r-pill);border:1px solid var(--pk-color-border);background:transparent;color:var(--pk-color-ink-muted);cursor:pointer}
.seg button.on{background:var(--pk-color-accent);color:var(--pk-color-accent-ink);border-color:var(--pk-color-accent)}
input[type=range]{width:150px;accent-color:var(--pk-color-accent)}
.numbox{width:84px;padding:7px 8px;border-radius:var(--pk-r-sm);border:1px solid var(--pk-color-border);background:var(--pk-color-surface);color:var(--pk-color-ink);font-family:var(--pk-font-num,inherit)}
.reduce-motion *{animation:none!important;transition:none!important}
.help-q{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;border:1px solid var(--pk-color-border);font-size:10px;color:var(--pk-color-ink-muted);cursor:pointer;margin-left:6px}
.divider{height:1px;background:var(--pk-color-border);margin:14px 0}
.pk-splash .pk-splash__rewards b{font-family:var(--pk-font-num,inherit)}
.flop .big-q{color:var(--pk-color-ink-muted)}
.win .big-q{color:var(--pk-color-success)}
</style>

function dirEffLabel(d){const e=(d&&d.effect)||{};const t=e.type,m=(e.mult||1).toFixed(2);return t==='q'?('Q×'+m):t==='money'?('💰×'+m):t==='rep'?('🏆×'+m):t==='chem'?((SET.lang==='en'?'chem×':'химия×')+m):('×'+m);}

 const effLabel=function(s){return s.type==='q'?('Q×'+s.mult.toFixed(2)):s.type==='money'?('💰×'+s.mult.toFixed(2)):('🏆×'+s.mult.toFixed(2));};
 const slot=function(label,inner,tap,filled){return `<div class="pk-slot ${filled?'is-selected':'is-empty'}" ${tap?`data-tap="${tap}"`:''} role="button" tabindex="0"><div style="font-size:9px;color:var(--pk-color-ink-muted)">${label}</div>${inner}</div>`;};

 const optSel=sel.filter(function(id){return req.indexOf(id)<0;});
 const optSlots=optSel.map(function(id){const s=studioById(id);return s?slot(L==='en'?'PRODUCTION':'ПРОДАКШН',`<div style="font-weight:600;font-size:12px;margin-top:2px">${L==='en'?s.en:s.ru}</div><div class="tiny muted">${effLabel(s)} · 💰${studioCostAt(s.id)} ✕</div>`,'studio:'+id,true):'';}).join('');
 const addProd=(optSel.length<PCAP)?slot(L==='en'?'PRODUCTION':'ПРОДАКШН',`<div class="muted small" style="margin-top:4px">＋ ${L==='en'?'add':'добавить'}</div>`,'prodpick',false):'';
 const dir=S.film.director&&dirById(S.film.director);
 const dirSlot=dir?slot(L==='en'?'DIRECTOR':'РЕЖИССЁР',`<div style="font-weight:600;font-size:12px;margin-top:2px">${L==='en'?dir.en:dir.ru}</div><div class="tiny muted">${dirEffLabel(dir)} · 💰${dirCostAt(dir)} ✕</div>`,'dirclear',true):slot(L==='en'?'DIRECTOR':'РЕЖИССЁР',`<div class="muted small" style="margin-top:4px">＋ ${L==='en'?'add':'добавить'}</div>`,'dirpick',false);
 const total=studioMods(sel.filter(prodOwn)).cost+(dir?dirCostAt(dir):0);
 return `<div class="sec">${L==='en'?'Production & Director':'Технологии и режиссёр'}${total?(' · 💰 '+fmtNum(total)+'/'+(L==='en'?'film':'фильм')):''}</div><div class="slots">${reqSlots}${optSlots}${addProd}${dirSlot}</div>`;}
function openProdPicker(){if(!S.film)return;const F=FORMATS[S.film.fmt];const sel=studioSel();const req=reqStudioIds(F);const owned=(S.prodOwned||[]).map(studioById).filter(function(s){return s&&req.indexOf(s.id)<0;});
 const card=function(s){const on=sel.indexOf(s.id)>=0;const ef=s.type==='q'?('Q×'+s.mult.toFixed(2)):s.type==='money'?('💰×'+s.mult.toFixed(2)):('🏆×'+s.mult.toFixed(2));return `<button class="pk-candidate ${on?'is-selected':''}" data-tap="prodtoggle:${s.id}"><div style="padding:10px"><div class="set-row__l">🎬 ${SET.lang==='en'?s.en:s.ru} ${on?'✓':''}</div><div class="tiny muted">${ef} · 💰${studioCostAt(s.id)}/${SET.lang==='en'?'film':'фильм'}</div></div></button>`;};
 const empty=owned.length?'':`<div style="padding:14px;text-align:center"><div class="tiny muted">${SET.lang==='en'?'No production cards yet — research to unlock, then get them in Collection.':'Пока нет продакшн-карт — исследуй в 🔬, потом возьми в Коллекции.'}</div><button class="pk-btn pk-btn--primary" style="margin-top:8px" data-tap="go:collection">→ ${SET.lang==='en'?'Collection':'Коллекция'}</button></div>`;
 $('#sheet').innerHTML=`<div class="pk-sheet__grip"></div><div class="pk-sheet__head"><div><div class="pk-sheet__title">${SET.lang==='en'?'Production cards':'Продакшн-карты'}</div><div class="pk-sheet__sub">${SET.lang==='en'?'From your collection · tap to place / remove':'Из коллекции · тап — поставить / убрать'}</div></div></div><div class="pk-sheet__body"><div class="cand-grid">${owned.map(card).join('')}${empty}</div></div>`;openOverlay('#sheet');}
function openDirPicker(){if(!S.film)return;const owned=(S.directorsOwned||[]).map(dirById).filter(Boolean);
 const card=function(d){const on=S.film.director===d.id;return `<button class="pk-candidate ${on?'is-selected':''}" data-tap="diradd:${d.id}"><div style="padding:10px"><div class="set-row__l">🎬 ${SET.lang==='en'?d.en:d.ru} ${on?'✓':''}</div><div class="tiny muted">${dirEffLabel(d)} · 💰${dirCostAt(d)}/${SET.lang==='en'?'film':'фильм'}</div></div></button>`;};
 const empty=owned.length?'':`<div style="padding:14px;text-align:center"><div class="tiny muted">${SET.lang==='en'?'No directors yet — develop the Director Bureau (🎭), then get them in Collection.':'Пока нет режиссёров — развей «Режиссёрское бюро» (🎭), потом возьми в Коллекции.'}</div><button class="pk-btn pk-btn--primary" style="margin-top:8px" data-tap="go:collection">→ ${SET.lang==='en'?'Collection':'Коллекция'}</button></div>`;
 $('#sheet').innerHTML=`<div class="pk-sheet__grip"></div><div class="pk-sheet__head"><div><div class="pk-sheet__title">${SET.lang==='en'?'Director':'Режиссёр'}</div><div class="pk-sheet__sub">${SET.lang==='en'?'One per film · different boosts':'Один на фильм · разные усиления'}</div></div></div><div class="pk-sheet__body"><div class="cand-grid">${owned.map(card).join('')}${empty}</div></div>`;openOverlay('#sheet');}

function unlockEvents(){
 const ev={};const push=(lv,label)=>{lv=+lv;if(lv>1&&label){(ev[lv]=ev[lv]||[]).push(label);}};
 Object.values(FORMATS).forEach(F=>push(F.lvl||1,SET.lang==='en'?(F.en||F.ru):F.ru));
 const u=UNLOCKMAP||{};
 if(u.channels){push(u.channels.festival,SET.lang==='en'?'Festivals':'Фестивали');push(u.channels.intl,SET.lang==='en'?'International (PvP)':'Международный (PvP)');}
 if(u.tiers)Object.keys(u.tiers).forEach(k=>push(u.tiers[k],(SET.lang==='en'?'Tier-':'Тир-')+k+' '+(SET.lang==='en'?'cards':'карты')));
 if(u.studioPerks)Object.keys(u.studioPerks).forEach(id=>{const s=STUDIO.find(x=>x.id===id);if(s)push(u.studioPerks[id],(SET.lang==='en'?'Studio: ':'Студия: ')+(SET.lang==='en'?s.en:s.ru));});
 return ev;
}
function nextUnlockLabel(){
 const L=level();const ev=unlockEvents();
 const lv=Object.keys(ev).map(Number).filter(x=>x>L).sort((a,b)=>a-b)[0];
 const at=lv||Math.min(L+1,30);const label=lv?ev[lv].join(' · '):titleFor(Math.min(L+1,30));
 const req=cumReq(at),prev=cumReq(L);
 return{label:label,at:`${t('level')} ${at}`,req,pct:clamp(Math.round((S.rep-prev)/Math.max(1,req-prev)*100),2,100)};
}

SCREENS.build=function(){
 if(!S.film||!FORMATS[S.film.fmt])startBuild(defaultFormat());
 const fmt=FORMATS[S.film.fmt];
 const fgrid=Object.values(FORMATS).map(F=>{
   const lk=!unlocked(F.id)&&F.lvl>level(),cd=cdLeft(F.id);
   return `<div class="fmt ${S.film.fmt===F.id?'is-selected':''} ${lk?'is-locked':''}" ${(!lk&&!cd)?`data-tap="fmt:${F.id}"`:''}>
     <div class="fmt__name">${F[SET.lang]||F.ru}</div><div class="fmt__meta">${F.slots.length}🎭 · ${t('budget').slice(0,3)} ${F.cap}</div>
     ${lk?`<div class="fmt__cd">${svg('lock','sm')} L${F.lvl}</div>`:cd?`<div class="fmt__cd">${svg('clock','sm')} ${fmtTime(cd)}</div>`:''}</div>`;
 }).join('');
 const cards=S.film.slots.filter(s=>s.card).map(s=>eff(s.card));
 const sc=score(cards),over=sc.bud>fmt.cap,filled=S.film.slots.every(s=>s.card);const bmult=boosterMult(),sbonus=scriptBonus();const sm=studioMods(studioSel());const finalQ=cards.length?Math.round(sc.Q*bmult*sbonus*sm.qMul):0;const needB=fmt.boosters||0;const boostOk=(S.film.boosters||[]).filter(Boolean).length>=needB;const reqMsgs=castReqMsgs(fmt,cards);const reqCost=studioMods(reqStudioIds(fmt)).cost;const studioAfford=S.money>=reqCost;const reqOwn=reqStudioIds(fmt).every(prodOwn);const reqOk=!reqMsgs.length&&studioAfford&&reqOwn;
 const slots=S.film.slots.map((s,i)=>{
   const c=s.card&&eff(s.card);
   return `<div class="pk-slot ${c?'is-selected':'is-empty'} ${over&&c?'is-error':''}" data-tap="slot:${i}" role="button" tabindex="0">
     <div style="font-size:9px;letter-spacing:.06em;color:var(--pk-color-ink-muted)">${c?c.role:(s.role||(SET.lang==='en'?'ANY':'ЛЮБАЯ'))}</div>
     ${c?`<div style="font-weight:600;font-size:12px;margin-top:2px">${c.name}</div><div class="tiny muted">${GENRE[c.genre][SET.lang]||GENRE[c.genre].ru} · ${Math.round(c.act+c.cha+c.dra+c.com)}⍟</div>`
        :`<div class="muted small" style="margin-top:4px">＋ ${t('pickCard')}</div>`}</div>`;
 }).join('');
 const pct=clamp(Math.round(sc.bud/fmt.cap*100),0,140);
 const chemTxt=sc.chem.list.length?sc.chem.list.map(x=>x[SET.lang==='en'?1:0]).join(' · '):'—';
 return `<h1 class="h1">${t('build')}</h1>${worldBanner()}
 <div class="sec">${t('pickFormat')}</div><div class="fmt-grid">${fgrid}</div>
 ${coachHTML('slot',t('slotsHint'))}
 ${scriptSectionHTML(fmt)}<div class="sec">${t('cast')} · ${fmt[SET.lang]||fmt.ru}</div><div class="slots">${slots}</div>${boosterSectionHTML(fmt)}${studioSectionHTML(fmt)}${cards.length?formingTropesHTML(cards):''}
 <div class="panel" style="margin-top:14px">
   <div class="row spread"><div><div class="tiny muted">${t('quality')}</div><div class="big-q" style="font-size:40px">${cards.length?finalQ:'—'}</div>${cards.length&&(sbonus>1||bmult>1)?`<div class="tiny" style="color:var(--pk-color-accent)">×${(sbonus*bmult).toFixed(2)}</div>`:''}</div>
     <div style="text-align:right">
       <div class="tiny muted">${t('pattern')}</div><div class="small" style="font-weight:700">${!cards.length?'—':disc(sc.pat.key)?(sc.pat[SET.lang==='en'?'en':'ru']+' ×'+sc.pat.mult.toFixed(2)):'✦ '+(SET.lang==='en'?'hidden':'скрытое')}</div>
       <div class="tiny muted" style="margin-top:6px">${t('chem')}</div><div class="small" style="font-weight:700">${cards.length?comboChemHTML(sc.chem):'—'}</div>
     </div></div>
   <div class="tiny muted" style="margin:10px 0 4px">${t('budget')}</div>
   <div class="pk-meter ${over?'is-error':''}"><div class="pk-meter__track"><div class="pk-meter__fill" style="width:${pct}%"></div></div><span class="pk-meter__val">${sc.bud}/${fmt.cap}</span></div>
   ${over?`<div class="pk-coach" style="margin-top:10px"><span class="pk-coach__dot"></span><div class="pk-coach__body">${t('over')}. ${t('overSub')}</div></div>`:''}

SCREENS.premiere=function(){
 const r=S.lastResult||{};const win=r.win;
 return `<div class="${win?'win':(r.flop?'flop':'')}" style="text-align:center;padding:12px 4px">
   <div class="pk-stage" style="height:140px;border-radius:var(--pk-r-lg);display:flex;align-items:center;justify-content:center;margin-bottom:16px">
     <span style="font-size:46px">${win?'🎬':(r.flop?'🎞️':'🎬')}</span></div>
   <div class="tiny muted" style="letter-spacing:.12em">${r.flop?t('flop').toUpperCase():t('win').toUpperCase()}</div>
   <div class="big-q">${r.Q}</div>
   <div class="small muted" style="margin-top:4px">${r.channelName} · ${r.pat}${r.worldMult&&r.worldMult>1.001?` · 📈 +${Math.round((r.worldMult-1)*100)}%`:''}${r.pvp?` · ${SET.lang==='en'?'world bar':'мировая планка'} ${r.oppQ}`:''}${r.cardUps?` · 🎭 +${r.cardUps} ${SET.lang==='en'?'card lvl':'ур.карт'}`:''}</div>${r.tropes&&r.tropes.length?`<div style="margin-top:8px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px">${r.tropes.map(n=>`<span class="pk-chip" style="color:var(--pk-color-accent);border-color:var(--pk-color-accent)">🎬 ${n}</span>`).join('')}</div>`:''}
   ${r.tomato!=null?`<div class="small" style="margin-top:10px;color:var(--pk-color-ink)">🍅 <b>${r.tomato}%</b> · ${tomatoVerdict(r.tomato)}${!r.flop?` · ${boxLabel(r.boxMult,r.recBand)}`:''}</div>`:''}
   ${r.flop?`<p class="sub" style="margin-top:14px">${t('flopSub')}${r.lost?` <b style="color:var(--pk-color-danger)">−${fmtNum(r.lost)} 🏆</b>`:''}</p>`
     :`<div class="pk-splash__rewards" style="display:flex;gap:18px;justify-content:center;margin:16px 0">
        <div><div class="big-q" style="font-size:24px;color:var(--pk-color-ink)">+${fmtNum(r.money)}</div><div class="tiny muted">💰 ${t('money')}</div></div>
        <div><div class="big-q" style="font-size:24px;color:var(--pk-color-ink)">+${fmtNum(r.rep)}</div><div class="tiny muted">🏆 ${t('acclaim')}</div></div>${r.studioCost?`<div><div class="big-q" style="font-size:24px;color:var(--pk-color-warn)">−${fmtNum(r.studioCost)}</div><div class="tiny muted">🎬 ${SET.lang==='en'?'studio':'студия'}</div></div>`:''}</div>`}
   <button class="pk-btn pk-btn--primary pk-btn--block" style="margin-top:8px" data-tap="finish">${t('backToStudio')}</button>
   <button class="pk-btn pk-btn--ghost pk-btn--block" style="margin-top:8px" data-tap="again">${t('buildAnother')}</button>
 </div>`;
};

SCREENS.collection=function(){
 const seg=`<div class="seg" style="margin-bottom:12px"><button class="on" data-tap="go:collection">${t('collection')}</button><button data-tap="go:shop">${t('shop')}</button></div>`;
 const L=SET.lang; const cat=S.collCat||'actors';
 const counts={actors:[...new Set(S.coll)].length,scenarios:[...new Set((S.scripts||[]).filter(id=>SCEN[id]))].length,production:[...new Set(S.prodOwned||[])].length,directors:[...new Set(S.directorsOwned||[])].length};
 const tabs=`<div class="seg" style="margin-bottom:12px">${[['actors',L==='en'?'Actors':'Актёры'],['scenarios',L==='en'?'Scenarios':'Сценарии'],['production',L==='en'?'Production':'Технологии'],['directors',L==='en'?'Directors':'Режиссёры']].map(x=>`<button class="${cat===x[0]?'on':''}" data-tap="collcat:${x[0]}">${x[1]} ${counts[x[0]]?'('+counts[x[0]]+')':''}</button>`).join('')}</div>`;
 const eff2=function(s){return s.type==='q'?('Q×'+s.mult.toFixed(2)):s.type==='money'?('💰×'+s.mult.toFixed(2)):('🏆×'+s.mult.toFixed(2));};
 const emptyHint=`<div style="padding:18px;text-align:center"><p class="sub">${L==='en'?'Nothing yet — research in the Lab (🔬), then buy in the Shop.':'Пока пусто — изучи в Лаборатории (🔬), потом купи в Магазине.'}</p><button class="pk-btn pk-btn--primary" data-tap="go:shop">→ ${L==='en'?'Shop':'Магазин'}</button></div>`;
 let body='';
 if(cat==='actors'){
   const uniq=[...new Set(S.coll)];const nowT=Date.now();const rs=(CFG.cardCd&&CFG.cardCd.resetStars)||1;
   const cardsHtml=uniq.map(id=>{const c=eff(id);const d=cardLvl(id);const cnt=S.coll.filter(x=>x===id).length;
     const cdLeft=(FLAGS.cardCooldown&&S.cardCd&&S.cardCd[id])?Math.max(0,S.cardCd[id]-nowT):0;
     const cdStr=FLAGS.cardCooldown?(cdLeft>0?('⏳ '+fmtTime(Math.ceil(cdLeft/1000))):('✓ '+(L==='en'?'ready':'готов'))):('⚡'+curEnergy(id));
     return `<div>${cardFull(c)}<div class="tiny muted" style="margin:6px 2px 2px;display:flex;justify-content:space-between"><span>${L==='en'?'Lv':'Ур.'} ${d}/${CFG.maxDev} <b style="color:var(--pk-color-accent)">×${cnt}</b></span><span>${cdStr}</span></div>${(FLAGS.cardCooldown&&cdLeft>0)?`<button class="pk-btn pk-btn--secondary pk-btn--block" style="font-size:11px" data-tap="cdreset:${id}">${L==='en'?'Reset cooldown':'Сбросить кулдаун'} · ⭐${rs}</button>`:''}</div>`;}).join('');
   body=`<div class="cards-grid">${cardsHtml}</div>`;
 } else if(cat==='scenarios'){
   const uniqS=[...new Set((S.scripts||[]).filter(id=>SCEN[id]))];
   body=uniqS.length?`<div class="cards-grid">${uniqS.map(id=>{const s=SCRIPTS[id]||SCEN[id];const cnt=(S.scripts||[]).filter(x=>x===id).length;const d=cardLvl(id);return cardU({name:(L==='en'?(s.en||id):(s.ru||id)),emoji:'📜',effHtml:(s.roles||[]).join(' · '),cnt:cnt,lvl:d});}).join('')}</div>`:emptyHint;
 } else if(cat==='production'){
   const uniqP=[...new Set(S.prodOwned||[])].map(id=>({id:id,s:studioById(id)})).filter(x=>x.s);
   body=uniqP.length?`<div class="cards-grid">${uniqP.map(o=>{const cnt=(S.prodOwned||[]).filter(x=>x===o.id).length;const d=cardLvl(o.id);return cardU({name:(L==='en'?o.s.en:o.s.ru),emoji:'🎬',tier:o.s.tier,effHtml:eff2(o.s),cnt:cnt,lvl:d});}).join('')}</div>`:emptyHint;
 } else if(cat==='directors'){
   const uniqD=[...new Set(S.directorsOwned||[])].map(id=>({id:id,d:dirById(id)})).filter(x=>x.d);
   body=uniqD.length?`<div class="cards-grid">${uniqD.map(o=>{const cnt=(S.directorsOwned||[]).filter(x=>x===o.id).length;const lv=cardLvl(o.id);return cardU({name:(L==='en'?o.d.en:o.d.ru),emoji:'🎬',tier:o.d.tier,effHtml:dirEffLabel(o.d),cnt:cnt,lvl:lv});}).join('')}</div>`:emptyHint;
 }
 return `<h1 class="h1">${t('collection')}</h1>${seg}${tabs}${body}`;
};
SCREENS.shop=function(){
 const L=SET.lang; const cat=S.shopCat||'actors';
 const seg=`<div class="seg" style="margin-bottom:12px"><button data-tap="go:collection">${t('collection')}</button><button class="on" data-tap="go:shop">${t('shop')}</button></div>`;
 const tabs=`<div class="seg" style="margin-bottom:12px">${[['actors',L==='en'?'Actors':'Актёры'],['scenarios',L==='en'?'Scenarios':'Сценарии'],['production',L==='en'?'Production':'Технологии'],['directors',L==='en'?'Directors':'Режиссёры']].map(x=>`<button class="${cat===x[0]?'on':''}" data-tap="shopcat:${x[0]}">${x[1]}</button>`).join('')}</div>`;
 const unl=S.shopUnlocked||[]; const PC=(window.PROKAT_CONTENT||{}); const TECHA=PC.tech||[]; const STUDA=PC.studio||[]; const DIRA=PC.directors||[];
 const techForPerk=function(pid){return TECHA.find(function(t){return t.unlocksPerk===pid;});};
 const nodeForScen=function(sid){return STUDA.find(function(nn){return nn.unlocks&&nn.unlocks.scenarios&&nn.unlocks.scenarios.indexOf(sid)>=0;});};
 const dirNode=STUDA.find(function(nn){return nn.unlocks&&nn.unlocks.directors;});
 const eff2=function(s){return s.type==='q'?('Q×'+s.mult.toFixed(2)):s.type==='money'?('💰×'+s.mult.toFixed(2)):('🏆×'+s.mult.toFixed(2));};
 const stateBtn=function(owned,unlk,bp,tap,hint){ if(owned)return `<button class="pk-btn pk-btn--ghost pk-btn--block" style="margin-top:8px" disabled>✓ ${L==='en'?'owned':'в коллекции'}</button>`; if(unlk){const af=(S.money||0)>=bp;return `<button class="pk-btn ${af?'pk-btn--secondary':'pk-btn--ghost'} pk-btn--block" style="margin-top:8px" ${af?`data-tap="${tap}"`:'disabled'}>🛒 ${fmtNum(bp)}</button>`;} return `<button class="pk-btn pk-btn--ghost pk-btn--block" style="margin-top:8px" disabled>🔒 ${hint}</button>`; };
 let grid='';
 if(cat==='actors'){ grid=POOL.map(c=>{const price=cardPrice(c);const lk=(c.tier>=2&&!unlocked('tier'+c.tier));return `<div class="pk-shop-item">${cardFull(c,{locked:lk})}<button class="pk-btn ${lk?'pk-btn--ghost':'pk-btn--secondary'} pk-btn--block" style="margin-top:8px" ${lk?'disabled':`data-tap="buy:${c.id}"`}>${lk?`${svg('lock','sm')} L${(UNLOCKMAP.tiers&&(UNLOCKMAP.tiers[c.tier]||UNLOCKMAP.tiers[String(c.tier)]))||3}`:`💰 ${fmtNum(price)}`}</button></div>`;}).join(''); }
 else if(cat==='production'){ grid=STUDIO.map(function(sp){const tn=techForPerk(sp.id);const hint=(L==='en'?'research ':'изучи ')+(tn?(L==='en'?tn.en:tn.ru):'tech');return `<div class="pk-shop-item">${cardU({name:(L==='en'?sp.en:sp.ru),emoji:'🎬',tier:sp.tier,effHtml:eff2(sp)})}${stateBtn(prodOwn(sp.id),unl.indexOf(sp.id)>=0,prodBuyPrice(sp),'buyprod:'+sp.id,hint)}</div>`;}).join(''); }
 else if(cat==='scenarios'){ grid=Object.keys(SCEN).map(function(id){const sc=SCEN[id];const nn=nodeForScen(id);const hint=(L==='en'?'develop ':'развей ')+(nn?(L==='en'?nn.en:nn.ru):'studio');const roles=(SCRIPTS[id]&&SCRIPTS[id].roles||[]).join(' · ');return `<div class="pk-shop-item">${cardU({name:(L==='en'?sc.en:sc.ru),emoji:'📜',effHtml:roles})}${stateBtn((S.scripts||[]).indexOf(id)>=0,unl.indexOf(id)>=0,scenBuyPrice(),'buyscen:'+id,hint)}</div>`;}).join(''); }
 else if(cat==='directors'){ grid=DIRA.map(function(d){const hint=(L==='en'?'develop ':'развей ')+(dirNode?(L==='en'?dirNode.en:dirNode.ru):'Director Bureau');return `<div class="pk-shop-item">${cardU({name:(L==='en'?d.en:d.ru),emoji:'🎬',tier:d.tier,effHtml:dirEffLabel(d)})}${stateBtn((S.directorsOwned||[]).indexOf(d.id)>=0,unl.indexOf(d.id)>=0,dirBuyPrice(d),'buydir:'+d.id,hint)}</div>`;}).join(''); }
 return `<h1 class="h1">${t('shop')}</h1>${seg}${tabs}<div class="shop-grid">${grid}</div>`;
};

SCREENS.codex=function(){
 const L=level(),nx=nextUnlockLabel();
 return `<h1 class="h1">${t('codex')}</h1>
 <div class="panel" style="text-align:center;padding:18px">
   <div style="font-size:34px">${svg('crown','lg')}</div>
   <div class="h1" style="font-size:20px;margin-top:6px">${titleFor(L)}</div>
   <div class="muted small">${t('level')} ${L} / 30</div>
   <div class="pk-meter" style="margin-top:12px"><div class="pk-meter__track"><div class="pk-meter__fill" style="width:${nx.pct}%"></div></div><span class="pk-meter__val">${fmtNum(S.rep)}/${fmtNum(nx.req)} 🏆</span></div>
 </div>
 <div class="sec">${SET.lang==='en'?'Career':'Карьера'}</div>
 <div class="panel"><div class="set-row"><div class="set-row__l">${t('acclaim')} (всего)</div><div>${fmtNum(S.rep)} 🏆</div></div>
   <div class="set-row"><div class="set-row__l">${SET.lang==='en'?'Premieres':'Премьер'}</div><div>${S.premieres}</div></div>
   <div class="set-row"><div class="set-row__l">${t('collection')}</div><div>${S.coll.length} 🎭</div></div>

 <div class="sec">${SET.lang==='en'?'Unlock roadmap (L1–30)':'Что открывается по уровням'}</div>
 <div class="panel">${(function(){const ev=unlockEvents();const ks=Object.keys(ev).map(Number).sort((a,b)=>a-b);if(!ks.length)return '<div class="tiny muted">—</div>';return ks.map(Lv=>`<div class="set-row"><div class="set-row__l" style="${Lv<=level()?'':'opacity:.6'}">${Lv<=level()?'✓':'🔒'} L${Lv}</div><div class="tiny" style="text-align:right;max-width:62%">${ev[Lv].join(' · ')}</div></div>`).join('');})()}</div>
 <div class="panel" style="margin-top:8px"><div class="tiny muted">💾 ${SET.lang==='en'?'Progress saves locally in THIS browser. Via the link on another browser/device it starts fresh — there is no server yet.':'Прогресс сохраняется локально в ЭТОМ браузере. По ссылке в другом браузере/устройстве — начнётся заново (бэкенда пока нет).'}</div></div>
 <div class="sec">${SET.lang==='en'?'Scenario cards':'Карты-сценарии'} (${Object.keys(SCEN).filter(id=>(S.scripts||[]).includes(id)).length}/${Object.keys(SCEN).length})</div>
 <div class="panel">${Object.keys(SCEN).map(id=>{const s=SCRIPTS[id]||SCEN[id];const own=(S.scripts||[]).includes(id);return `<div class="set-row"><div class="set-row__l">${own?'📜 '+(SET.lang==='en'?s.en:s.ru):'🔒 ???'}</div><div>${own?'✓':svg('lock','sm')}</div></div>`;}).join('')}</div>
 <div class="sec">${SET.lang==='en'?'Tropes':'Тропы'} (${(S.tropesSeen||[]).length}/${TROPES.length})</div>
 <div class="panel">${TROPES.map(t=>`<div class="set-row"><div class="set-row__l">${(S.tropesSeen||[]).includes(t.id)?'🎬 '+tropeName(t):'✦ ???'}</div><div>${(S.tropesSeen||[]).includes(t.id)?'✓':svg('lock','sm')}</div></div>`).join('')}</div>
 <div class="sec">${SET.lang==='en'?'Combos discovered':'Открытые комбо'} (${(S.discovered||[]).length}/${COMBO_CAT.length})</div>
 <div class="panel">${COMBO_CAT.map(c=>`<div class="set-row"><div class="set-row__l">${disc(c[0])?(SET.lang==='en'?c[2]:c[1]):'✦ ???'}</div><div>${disc(c[0])?'✓':svg('lock','sm')}</div></div>`).join('')}</div>
 <div class="sec">${SET.lang==='en'?'Unlocked':'Открыто'}</div>
 <div class="panel">${Object.values(FORMATS).map(F=>{const u=unlocked(F.id);return `<div class="set-row"><div class="set-row__l">${SET.lang==='en'?(F.en||F.ru):F.ru}${(F.lvl||1)>1?` <span class="tiny muted">L${F.lvl}</span>`:''}</div><div>${u?'✓':svg('lock','sm')}</div></div>`;}).join('')}${(function(){const u=UNLOCKMAP||{};const rows=[];[['festival',SET.lang==='en'?'Festivals':'Фестивали',(u.channels&&u.channels.festival)||4],['intl',SET.lang==='en'?'International':'Международный',(u.channels&&u.channels.intl)||6]].forEach(c=>rows.push(`<div class="set-row"><div class="set-row__l">${c[1]} <span class="tiny muted">L${c[2]}</span></div><div>${unlocked(c[0])?'✓':svg('lock','sm')}</div></div>`));if(u.tiers)Object.keys(u.tiers).forEach(k=>rows.push(`<div class="set-row"><div class="set-row__l">${(SET.lang==='en'?'Tier-':'Тир-')+k} ${(SET.lang==='en'?'cards':'карты')} <span class="tiny muted">L${u.tiers[k]}</span></div><div>${unlocked('tier'+k)?'✓':svg('lock','sm')}</div></div>`));return rows.join('');})()}</div>`;
};

SCREENS.settings=function(){
 const tab=S.setTab||'player';
 return `<h1 class="h1">${t('settings')}</h1><div class="tiny muted" style="margin:-6px 0 12px">build ${BUILD_STAMP}</div>
 <div class="seg" style="margin-bottom:14px">
   <button class="${tab==='player'?'on':''}" data-tap="settab:player">${t('player')}</button>
   <button class="${tab==='operator'?'on':''}" data-tap="settab:operator">${t('operator')}</button></div>
 ${tab==='player'?playerSettings():operatorSettings()}`;

function segRow(label,opts,cur,cmd){return `<div class="set-row"><div class="set-row__l">${label}</div>
 <div class="seg">${opts.map(o=>`<button class="${cur===o[0]?'on':''}" data-tap="${cmd}:${o[0]}">${o[1]}</button>`).join('')}</div></div>`;}
function boolRow(label,on,cmd,help){return `<div class="set-row"><div><div class="set-row__l">${label}${help?` <span class="help-q" data-tap="help:${help}">?</span>`:''}</div></div>
 <div class="seg"><button class="${on?'on':''}" data-tap="${cmd}:1">${SET.lang==='en'?'On':'Вкл'}</button><button class="${!on?'on':''}" data-tap="${cmd}:0">${SET.lang==='en'?'Off':'Выкл'}</button></div></div>`;}
function playerSettings(){
 return `<div class="panel">
   ${segRow(t('theme'),EPOCHS.map(e=>[e[0],e[1]]),SET.theme,'theme')}
   ${segRow(t('mode'),[['dark','🌙'],['light','☀️']],SET.mode,'mode')}
   ${segRow(t('language'),[['ru','RU'],['en','EN']],SET.lang,'lang')}
   ${boolRow(t('reduceMotion'),SET.reduceMotion,'pbool:reduceMotion')}

   <div class="set-row"><div class="set-row__l" style="color:var(--pk-color-danger)">${t('resetGame')}</div><button class="pk-btn pk-btn--danger" data-tap="resetGame">⟲</button></div></div>`;
}
function opRange(key,label,min,max,step){const v=SET.op[key];

   <div class="tiny muted" id="v_${key}">${v}</div></div></div>`;}
function opLevers(){

function resolvePremiere(chanId){const ch=CHANNELS.find(c=>c.id===chanId);
 const used=S.film.slots.filter(s=>s.card);const cards=used.map(s=>eff(s.card));const sc=score(cards);if(S.boostActive&&S.boosters>0){sc.Q=Math.round(sc.Q*1.25);S.boosters--;S.boostActive=false;}const _sm=studioMods((S.film.studio)||[]);var _dir=S.film.director&&dirById(S.film.director);if(_dir){var _de=_dir.effect||{};if(_de.type==='q'||_de.type==='chem')_sm.qMul*=(_de.mult||1);else if(_de.type==='money')_sm.moneyMul*=(_de.mult||1);else if(_de.type==='rep')_sm.repMul*=(_de.mult||1);_sm.cost+=dirCostAt(_dir);}sc.Q=Math.round(sc.Q*scriptBonus()*boosterMult()*_sm.qMul);const _trp=detectTropesG(cards,(S.film&&S.film.script),(S.film&&S.film.studio)||[]);const _tm=tropeMulG(_trp);if(_tm>1)sc.Q=Math.round(sc.Q*_tm);const _Qexp=sc.Q;const _wm=worldMultG(castGenre(cards),ch.id);const _fit=castFitG(sc.pat.mult,sc.chem.mult);const _seed=((((S.premieres+1)>>>0)*2654435761) ^ (gameDay()*40503) ^ hashCast(cards))>>>0;let _rcp=null;(S.film.boosters||[]).forEach(b=>{if(b&&S.boosterInv&&S.boosterInv[b])S.boosterInv[b]--;});const th=channelTh(ch);if(!S.discovered)S.discovered=[];const newCombo=[];[sc.pat.key].concat(sc.chem.list.map(x=>CHEMKEY[x[0]])).forEach(k=>{if(k&&k!=='none'&&!S.discovered.includes(k)){S.discovered.push(k);newCombo.push(k);}});
 let oppQ=null,win=true,flop=false,money=0,rep=0,lost=0;const stake=repStake(S.film.fmt,ch);
 if(ch.pvp){const _L=level();const _of=th*(1.00+_L/250);const _op=sc.Q*Math.min(0.97,0.82+_L/250);oppQ=Math.round(Math.max(_of,_op));win=sc.Q>=th&&sc.Q>oppQ;flop=!win;}
 else{win=sc.Q>=th;flop=!!ch.flop&&!win;}
 const oldL=level();
 if(FLAGS.qVarianceEnabled)_rcp=receptionG(_Qexp,th,_fit,!flop,_seed);
 const _mM=_rcp?_rcp.moneyMult:1,_rM=_rcp?_rcp.repMult:1;
 if(!flop){money=Math.round(sc.Q*ch.m*SET.op.payoutMult*_sm.moneyMul*_wm*_mM);rep=Math.round(sc.Q*ch.a*SET.op.acclaimMult*(sc.perkRepMul||1)*_sm.repMul*_wm*_rM);S.money+=money-_sm.cost;earnRep(rep);}
 else{lost=Math.min(stake,spendable());loseRep(stake);}
 let dailyB=null;if(SET.op.dailyEnabled&&!dailyDone()&&!flop){const dl=todaysDaily();if(dl.e.match(dl.v,cards,S.film,sc)){const b=dl.e.bonus({rep,money});if(b.rep)earnRep(b.rep);if(b.money)S.money+=b.money;S.dailyDone=dailyKey();dailyB={rep:b.rep||0,money:b.money||0};}}
 if(!FLAGS.cardCooldown&&level()>=2)used.forEach(s=>useEnergy(s.card));let cardUps=0;if(FLAGS.cardCooldown){if(!S.cardCd)S.cardCd={};var _cc=CFG.cardCd||{};used.forEach(function(s){S.cardCd[s.card]=Date.now()+Math.round((( _cc.baseSec||80)+(_cc.perLevelSec||40)*cardLvl(s.card))*1000*SET.op.cooldownMult*(S.patron?0.5:1));});}else{const xpg=Math.max(3,Math.round(sc.Q/35));used.forEach(s=>{cardUps+=grantCardXp(s.card,xpg);});}S.premieres++;
 S.cd[S.film.fmt]=Date.now()+Math.round(FORMATS[S.film.fmt].cd*1000*SET.op.cooldownMult);
 if(!S.tropesSeen)S.tropesSeen=[];const _newTr=[];if(!flop)_trp.forEach(t=>{if(S.tropesSeen.indexOf(t.id)<0){S.tropesSeen.push(t.id);_newTr.push(t);}});if(_newTr.length)earnRep(_newTr.length*15);S.lastResult={Q:sc.Q,channelName:ch[SET.lang]||ch.ru,pat:sc.pat[SET.lang==='en'?'en':'ru'],money,rep,lost,flop,win:!flop,pvp:!!ch.pvp,oppQ,cardUps,daily:dailyB,studioCost:(!flop?_sm.cost:0),qExp:_Qexp,tomato:_rcp?_rcp.tomato:null,boxMult:_rcp?_rcp.moneyMult:1,recBand:_rcp?_rcp.band:0,worldMult:_wm,tropes:_trp.map(tropeName),newTropes:_newTr.map(tropeName)};
 const nl=level();if(nl>oldL)S.pendingLevel=[oldL,nl];if(typeof ensureUnlocks==='function')ensureUnlocks();if(!flop&&Math.random()<0.25){if(!S.boosterInv)S.boosterInv={};const _b=Object.keys(BOOSTERS)[Math.floor(Math.random()*Object.keys(BOOSTERS).length)];S.boosterInv[_b]=(S.boosterInv[_b]||0)+1;}
 if(typeof window!=='undefined'&&window._simMode)return;closeOverlay();go('premiere');beep(flop?200:680);if(newCombo.length)setTimeout(()=>toast((SET.lang==='en'?'✦ New combo: ':'✦ Открыто комбо: ')+newCombo.map(comboName).join(', ')),300);if(_newTr.length)setTimeout(()=>toast('🎬 '+(SET.lang==='en'?'New trope: ':'Новый троп: ')+_newTr.map(tropeName).join(', ')),360);if(dailyB)setTimeout(()=>toast((SET.lang==='en'?'Daily bonus! ':'Дневной бонус! ')+(dailyB.rep?'+'+dailyB.rep+'🏆 ':'')+(dailyB.money?'+'+dailyB.money+'💰':'')),420);}

 const score01=1-(place-1)/(N-1);const dMMR=Math.round(32*(score01-0.5));S.mmr=Math.max(0,S.mmr+dMMR);if(!S.mmrPeak||S.mmr>S.mmrPeak)S.mmrPeak=S.mmr;

function mcSimulate(N,maxT){
 const _bk=JSON.stringify({S:S,SET:SET});const _snd=SET.sound;window._simMode=true;SET.sound=false;
 const keys=['L30','combos','cardMax','allFormats','allScripts'];const agg={};keys.forEach(k=>agg[k]=[]);let dead=0,fmtsum=0;
 const chOpen=id=>(id==='streaming'||id==='home')?true:id==='festival'?(unlocked('festival')&&SET.op.festivalEnabled):id==='intl'?(unlocked('intl')&&SET.op.pvpEnabled):false;
 const fresh=()=>[...new Set(S.coll)];const bcount=()=>Object.values(S.boosterInv||{}).reduce((a,b)=>a+b,0);
 try{for(let p=0;p<N;p++){
   newGame();SET.op.cooldownMult=0;S.prodOwned=STUDIO.map(s=>s.id);try{S.scripts=Object.keys(SCRIPTS);S.directorsOwned=((window.PROKAT_CONTENT&&window.PROKAT_CONTENT.directors)||[]).map(function(d){return d.id;});}catch(e){}S._made={};const first={};
   for(let t=1;t<=maxT;t++){
    S.energy={};S.cd={};
    const cands=Object.values(FORMATS).filter(F=>level()>=F.lvl&&F.channels.some(chOpen)&&(!F.boosters||bcount()>=F.boosters)&&(!fmtFixedScript(F)||(S.scripts||[]).includes(fmtFixedScript(F)))&&fresh().length>=F.slots.length);
    if(!cands.length){dead++;continue;}
    const F=cands.find(x=>!S._made[x.id])||cands.sort((a,b)=>b.cap-a.cap)[0];startBuild(F.id);
    if(Math.random()<0.15){const bg={};fresh().forEach(id=>{const c=byId(id);if(c)(bg[c.genre]=bg[c.genre]||[]).push(id);});const g=Object.keys(bg).find(g=>bg[g].length>=S.film.slots.length);if(g)S.film.slots.forEach(sl=>{const a=bg[g].filter(id=>!S.film.slots.some(o=>o.card===id)&&(sl.role?byId(id).role===sl.role:true));if(a.length)sl.card=a[0];});}
    const vy=Math.random()<0.4;S.film.slots.forEach(sl=>{if(sl.card)return;let pool=fresh().map(byId).filter(c=>c&&(sl.role?c.role===sl.role:true)&&!S.film.slots.some(o=>o.card===c.id));if(!pool.length)return;pool=vy?pool.sort(()=>Math.random()-0.5):pool.map(c=>eff(c.id)).sort((a,b)=>(b.act+b.cha+b.dra+b.com)-(a.act+a.cha+a.dra+a.com));sl.card=pool[0].id;});
    if(F.boosters){const have=Object.keys(S.boosterInv||{}).filter(k=>S.boosterInv[k]>0);S.film.boosters=[];for(let i=0;i<F.boosters;i++)S.film.boosters[i]=have[i%Math.max(1,have.length)];}
    if(!S.film.slots.every(s=>s.card)){dead++;continue;}
    const Q=score(S.film.slots.map(s=>eff(s.card))).Q;const open=F.channels.filter(chOpen).map(id=>CHANNELS.find(c=>c.id===id));
    const ch=open.filter(c=>Q>=channelTh(c)).sort((a,b)=>b.a-a.a)[0]||open.sort((a,b)=>channelTh(a)-channelTh(b))[0];if(!ch){dead++;continue;}
    resolvePremiere(ch.id);S._made[F.id]=true;S.film=null;
    if(S.money>450){S.coll.push(POOL[Math.floor(Math.random()*POOL.length)].id);S.money-=300;}if(typeof window!=='undefined'&&window.__gacha){try{window.__gacha.open('daily');if(S.money>1200)window.__gacha.open('basic');window.__gacha.mergeAll();}catch(e){}}
    if(t%12===0&&chOpen('festival')){try{enterFestival();closeOverlay();}catch(e){}}
    const a={L30:level()>=30,combos:(S.discovered||[]).length>=COMBO_CAT.length,cardMax:fresh().some(id=>cardLvl(id)>=CFG.maxDev),allFormats:Object.keys(FORMATS).every(k=>S._made[k]),allScripts:Object.keys(SCRIPTS).every(k=>(S.scripts||[]).includes(k))};
    for(const k in a)if(a[k]&&!(k in first))first[k]=t;
   }
   keys.forEach(k=>agg[k].push(first[k]!==undefined?first[k]:Infinity));fmtsum+=Object.keys(S._made).length;
 }}catch(e){}
 const d=JSON.parse(_bk);S=d.S;SET=d.SET;SET.sound=_snd;window._simMode=false;save();
 const med=a=>{const fl=a.filter(isFinite).sort((x,y)=>x-y);return fl.length?fl[Math.floor(fl.length/2)]:Infinity;};const reach=a=>Math.round(100*a.filter(isFinite).length/a.length);
 return {rows:keys.map(k=>({k:k,reach:reach(agg[k]),med:med(agg[k])})),dead:dead,avgFmt:(fmtsum/N).toFixed(1),N:N,maxT:maxT};
}
/* ===================== TECH + STUDIO TREES (Part C: research/develop UI; enforcement flag-gated in Part D) ===================== */
function _treeInit(){ if(!S.research)S.research={done:[],active:null}; if(!S.studioDev)S.studioDev={done:[],active:null}; }
function _treeNodes(k){ const C=window.PROKAT_CONTENT||{}; return (k==='tech'?C.tech:C.studio)||[]; }
function _treeDone(k){ _treeInit(); return k==='tech'?S.research.done:S.studioDev.done; }
function _treeActive(k){ _treeInit(); return k==='tech'?S.research.active:S.studioDev.active; }
function treeHas(k,id){ return _treeDone(k).indexOf(id)>=0; }
function _treeHourSec(){ return (CFG.research&&CFG.research.hourSec)||4; }
function nodePrereqMet(k,n){ const d=_treeDone(k); return (n.prereq||[]).every(function(p){return d.indexOf(p)>=0;}); }
function nodeStatus(k,n){ if(treeHas(k,n.id))return'done'; const a=_treeActive(k); if(a&&a.id===n.id)return'active'; if(level()<(n.reqLevel||1))return'locked'; if(!nodePrereqMet(k,n))return'locked'; return'ready'; }
function nodeRemainMs(k){ const a=_treeActive(k); return a?Math.max(0,a.end-Date.now()):0; }
function grantNodeUnlocks(k,nd){ if(!nd)return; if(!S.shopUnlocked)S.shopUnlocked=[];
  var add=function(id){if(S.shopUnlocked.indexOf(id)<0)S.shopUnlocked.push(id);};
  if(k==='studio'){ var u=nd.unlocks||{};
    (u.scenarios||[]).forEach(add); (u.directors||[]).forEach(add);
    if(!S.devGenres)S.devGenres=[]; (u.genres||[]).forEach(function(g){if(S.devGenres.indexOf(g)<0)S.devGenres.push(g);});
    if(!S.devTiers)S.devTiers=[]; (u.tiers||[]).forEach(function(t){if(S.devTiers.indexOf(t)<0)S.devTiers.push(t);});
  } else if(k==='tech'){ if(nd.unlocksPerk)add(nd.unlocksPerk); } }
function _finishNode(k){ const a=_treeActive(k); if(!a)return; if(_treeDone(k).indexOf(a.id)<0)_treeDone(k).push(a.id); var _gn=_treeNodes(k).find(function(x){return x.id===a.id;}); grantNodeUnlocks(k,_gn); if(k==='tech')S.research.active=null; else S.studioDev.active=null; }
function tickTrees(){ let ch=false; ['tech','studio'].forEach(function(k){ const a=_treeActive(k); if(a&&Date.now()>=a.end){_finishNode(k);ch=true;} }); if(ch)save(); return ch; }
function startNode(k,id){ _treeInit(); const n=_treeNodes(k).find(function(x){return x.id===id;}); if(!n)return; const NE=(SET.lang==='en'?'Not enough ':'Недостаточно '); if(_treeActive(k)){toast(SET.lang==='en'?'One project at a time':'Один проект за раз');return;} if(nodeStatus(k,n)!=='ready'){toast(SET.lang==='en'?'Locked':'Заблокировано');return;} const cm=n.costMoney||0,cp=n.costPrestige||0; if(S.money<cm){toast(NE+'💰');return;} if(spendable()<cp){toast(NE+'🏆');return;} S.money-=cm; if(cp>0)loseRep(cp); const hrs=(n.researchHours!=null?n.researchHours:n.devHours)||0; const slot={id:id,hrs:hrs,end:Date.now()+hrs*_treeHourSec()*1000}; if(k==='tech')S.research.active=slot; else S.studioDev.active=slot; if(hrs<=0)_finishNode(k); save(); paint(); }
function rushNode(k){ const a=_treeActive(k); if(!a)return; const cost=(CFG.research&&CFG.research.rushStars)||2; if((S.stars||0)<cost){toast((SET.lang==='en'?'Not enough ':'Недостаточно ')+'⭐');return;} S.stars-=cost; a.end=Date.now(); _finishNode(k); save(); paint(); toast(SET.lang==='en'?'Rushed ⭐':'Ускорено ⭐'); }
function godUnlock(k,id){ _treeInit(); const d=_treeDone(k); if(d.indexOf(id)<0)d.push(id); var _gn=_treeNodes(k).find(function(x){return x.id===id;}); grantNodeUnlocks(k,_gn); save(); paint(); }
function godReset(k){ _treeInit(); if(k==='tech')S.research={done:[],active:null}; else S.studioDev={done:[],active:null}; save(); paint(); }

if(typeof window!=='undefined'){window.__gacha={open:doOpenPack,mergeAll:mergeAllSim};}
}catch(err){console.warn('gacha init failed',err);}})();
